<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="rps.css" />
  </head>
  <body>
    <div class="container">
      <h1>Rock Paper Scissors</h1>
      <div class="game">
        <div class="user">
          <div class="choices">
            <div class="choice" id="rock" onclick="genUserChoice(rock)">
              <img src="images/rock.png" />
            </div>
            <div class="choice" id="paper" onclick="genUserChoice(paper)">
              <img src="images/paper.png" />
            </div>
            <div class="choice" id="scissors" onclick="genUserChoice(scissors)">
              <img src="images/scissors.png" />
            </div>
          </div>
          <div class="score">
            <p id="userScore">0</p>
            <h2>You</h2>
          </div>
        </div>
        <div class="comp">
          <div class="score">
            <p id="compScore">0</p>
            <h2>Comp</h2>
          </div>
          <div class="choices">
            <div id="rock-comp">
              <img src="images/rock.png" />
            </div>
            <div id="paper-comp">
              <img src="images/paper.png" />
            </div>
            <div id="scissors-comp">
              <img src="images/scissors.png" />
            </div>
          </div>
        </div>
      </div>
      <p id="msg">Play Your Move</p>
    </div>
    <script defer src="rps.js"></script>
  </body>
</html>
